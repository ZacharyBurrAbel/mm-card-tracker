<style>
:root{--black:#0d0d0d;--red:#c8102e;--red-dark:#9b0c22;--gold:#c9a84c;--gold-light:#f5ecd4;--white:#fff;--g50:#f8f8f8;--g100:#f0f0f0;--g200:#e0e0e0;--g400:#999;--g600:#555;--g800:#222;--green:#1a7a3a;--green-bg:#eaf5ee;--amber-bg:#fff8e6;--amber:#b07d1a;--pattern:#fff3cd;--pattern-border:#f0a500;--fd:'Oswald',sans-serif;--fb:'Source Sans 3',sans-serif;--r:6px;--rl:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--g50);color:var(--g800);font-size:15px;line-height:1.5}
.header{background:var(--black);padding:16px 22px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:3px solid var(--red)}
.hl{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--white);letter-spacing:.04em}.hl span{color:var(--red)}
.hsub{font-size:11px;color:var(--g400);margin-top:1px}
.hup{font-size:11px;color:var(--g400)}
.controls{background:var(--white);border-bottom:1px solid var(--g200);padding:12px 22px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100}
.sw{position:relative;flex:1;min-width:180px}
.sw input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--g200);border-radius:var(--r);font-family:var(--fb);font-size:14px;background:var(--g50);outline:none;transition:border-color .15s}

.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:14px;pointer-events:none}
.itabs{display:flex;gap:5px;flex-wrap:wrap}
.tb{padding:5px 11px;border:1px solid var(--g200);border-radius:var(--r);background:var(--white);font-family:var(--fd);font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--g600);cursor:pointer;transition:all .15s;white-space:nowrap}

.rc{font-size:11px;color:var(--g400);white-space:nowrap}
.main{padding:18px 22px;max-width:1400px;margin:0 auto}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:13px}
.card{background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);overflow:hidden;transition:box-shadow .15s}

.cd{width:6px;height:6px;border-radius:50%;flex-shrink:0}

// Helper: generate monthly array from Jan 2016 to Jun 2026 (126 months)
function makeMonths(){
  const out=[];
  for(let y=2016;y<=2026;y++){
    const end = y===2026?6:12;
    for(let m=1;m<=end;m++) out.push(`${y}-${String(m).padStart(2,'0')}`);
  }
  return out;
}
const ALL_MONTHS = makeMonths(); // 126 entries
 
function ymLabel(ym){
  const [y,m]=ym.split('-');
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mn[parseInt(m)-1]+' '+y;
}
 
// ── CARD DATA ─────────────────────────────────────────────────────────────────

// monthly.tgt: targeted offers
// elevated: array of month-indices where historically elevated (for pattern band)
// notes indexed to ALL_MONTHS (sparse object)
// approx: true if data is quarterly estimates
 
// Helper: fill a monthly array given breakpoints [{from:'YYYY-MM',val:N}]
function fillSpend(breaks){
  // breaks: [{from:'YYYY-MM',to:'YYYY-MM',val:'$Xk/Ymo'}]
  const arr=new Array(126).fill(null);
  if(!breaks) return arr;
  breaks.forEach(({from,to,val})=>{
    const fi=ALL_MONTHS.indexOf(from);
    const ti=to?ALL_MONTHS.indexOf(to):125;
    if(fi<0)return;
    for(let i=fi;i<=Math.min(ti,125);i++) arr[i]=val;
  });
  return arr;
}
 
function fillMonths(breaks, tgtBreaks){
  const pub=new Array(126).fill(null);
  const tgt=new Array(126).fill(null);
  breaks.forEach(({from,to,val})=>{
    const fi=ALL_MONTHS.indexOf(from);
    const ti=to?ALL_MONTHS.indexOf(to):125;
    if(fi<0)return;
    for(let i=fi;i<=Math.min(ti,125);i++) pub[i]=val;
  });
  if(tgtBreaks) tgtBreaks.forEach(({from,to,val})=>{
    const fi=ALL_MONTHS.indexOf(from);
    const ti=to?ALL_MONTHS.indexOf(to):125;
    if(fi<0)return;
    for(let i=fi;i<=Math.min(ti,125);i++) tgt[i]=val;
  });
  return{pub,tgt};
}

let activeIssuer='all', searchQ='', modalChart=null, activeCard=null, viewMode='all', activeYear=null;
 
function getFiltered(){
  return CARDS.filter(c=>{
    const mi=activeIssuer==='all'||c.issuer===activeIssuer;
    const q=searchQ.toLowerCase();
    const ms=!q||c.name.toLowerCase().includes(q)||c.tags.some(t=>t.includes(q))||IC[c.issuer].lbl.toLowerCase().includes(q)||c.current.toLowerCase().includes(q);
    return mi&&ms;
  });
}
 
function ratingPct(c){
  const m=c.atb.match(/([\d,]+)k/i);
  if(!m)return 20;
  return Math.min(100,Math.round(parseInt(m[1].replace(/,/g,''))*1000/300000*100));
}
 
function buildCard(c){
  const ic=IC[c.issuer];
  const rc={great:{l:'Great offer',cl:'tg'},good:{l:'Good offer',cl:'tgood'},below:{l:'Below avg',cl:'tbl'}}[c.rating];
  const cc={high:{l:'High confidence',cl:'ch2'},med:{l:'Medium confidence',cl:'cm'},low:{l:'Limited data',cl:'cl'}}[c.conf];
  const pct=ratingPct(c);
  const bc=c.rating==='great'?'#1a7a3a':c.rating==='good'?'#b07d1a':'#999';
  const lmBtn=c.link?`<a class="btn-learn" href="${c.link}" target="_blank" rel="noopener">Learn More ↗</a>`:'';
  return `<div class="card">
    <div class="ch">
      <div style="flex:1;min-width:0">
        <div class="cn">${c.name}</div>
        <div class="cf">Annual Fee: ${c.af===0?'No Annual Fee':'$'+c.af}</div>
      </div>
      <span class="cib ${ic.badge}">${ic.lbl}</span>
    </div>
    <div class="cb">
      <div style="margin-bottom:9px">
        <div class="ol">Current best offer</div>
        <div class="ov">${c.current} <span class="otag ${rc.cl}">${rc.l}</span></div>
      </div>
      <div style="margin-bottom:6px">
        <div class="ol">All-time best</div>
        <div class="ov oh">${c.atb}</div>
      </div>
 
    </div>
    <div class="cfoot">
      <button class="btn-chart" onclick="openModal('${c.id}')">📈 History & Pattern</button>
      ${lmBtn}
      <div class="dc"><div class="cd ${cc.cl}"></div>${cc.l}</div>
    </div>
  </div>`;
}
 
function renderCards(){
  const fil=getFiltered();
  document.getElementById('rc').textContent=`${fil.length} card${fil.length!==1?'s':''}`;
  const main=document.getElementById('main');
  if(!fil.length){main.innerHTML=`<div class="nr"><div class="nr-i">🔍</div><div>No cards found for "${searchQ}"</div></div>`;return;}
  if(activeIssuer!=='all'){main.innerHTML=`<div class="cg">${fil.map(buildCard).join('')}</div>`;return;}
  const by={};fil.forEach(c=>{(by[c.issuer]||(by[c.issuer]=[])).push(c);});
  const order=['amex','chase','co','citi','barclay','boa','bilt','usb'];
  main.innerHTML=order.filter(i=>by[i]).map(i=>`<div class="is"><div class="ih">${IC[i].lbl}<span class="ic">${by[i].length}</span></div><div class="cg">${by[i].map(buildCard).join('')}</div></div>`).join('');
}
 
// ── MODAL ──────────────────────────────────────────────────────────────────────
function getChartData(card){
  // Returns {labels, pubData, tgtData, patternBands, peakIdx}
  if(viewMode==='monthly'){
    // Show monthly for selected year, or all months
    const labels=ALL_MONTHS.map(ymLabel);
    return{labels,pubData:card.pub,tgtData:card.tgt,months:ALL_MONTHS};
  }
  if(viewMode==='all'){
    // Yearly aggregated (max per year)
    const years=[];
    for(let y=2016;y<=2026;y++) years.push(y);
    const pub=years.map(y=>{
      const idxs=ALL_MONTHS.map((m,i)=>m.startsWith(y+'-')?i:-1).filter(i=>i>=0);
      const vals=idxs.map(i=>card.pub[i]).filter(v=>v!==null);
      return vals.length?Math.max(...vals):null;
    });
    const tgt=years.map(y=>{
      const idxs=ALL_MONTHS.map((m,i)=>m.startsWith(y+'-')?i:-1).filter(i=>i>=0);
      const vals=idxs.map(i=>card.tgt[i]).filter(v=>v!==null&&v!==undefined);
      return vals.length?Math.max(...vals):null;
    });
    // Pattern: which years had elevated months
    const elevYears=new Set(card.elevated.map(i=>i>=0?parseInt(ALL_MONTHS[i].split('-')[0]):null));
    return{labels:years.map(String),pubData:pub,tgtData:tgt,elevYears,years};
  }
  // Specific year view
  const y=activeYear;
  const idxs=ALL_MONTHS.map((m,i)=>m.startsWith(y+'-')?i:-1).filter(i=>i>=0);
  const labels=idxs.map(i=>ymLabel(ALL_MONTHS[i]));
  const pub=idxs.map(i=>card.pub[i]);
  const tgt=idxs.map(i=>card.tgt[i]);
  return{labels,pubData:pub,tgtData:tgt,idxs};
}
 
function openModal(id){
  const card=CARDS.find(c=>c.id===id);
  if(!card)return;
  activeCard=card;
  viewMode='all';activeYear=null;
  const ic=IC[card.issuer];
  document.getElementById('mt').textContent=card.name;
  document.getElementById('mss').textContent=`${ic.lbl} · ${card.af===0?'No Annual Fee':'$'+card.af+' Annual Fee'}`;
  const modalLM = document.getElementById('modalLearnMore');
  if(card.link){ modalLM.href=card.link; modalLM.style.display='flex'; }
  else { modalLM.style.display='none'; }
  // Stats
  const pubMax=Math.max(...card.pub.filter(Boolean));
  const tgtMax=card.tgt?Math.max(...card.tgt.filter(Boolean)):0;
  const isCash=card.isCash||false;
  document.getElementById('mst').innerHTML=`
    <div class="msi"><div class="msil">Current offer</div><div class="msiv hl2">${card.current.split('/')[0].trim()}</div></div>
    <div class="msi"><div class="msil">All-time best</div><div class="msiv">${card.atb.split('(')[0].trim()}</div></div>
    <div class="msi"><div class="msil">Public peak</div><div class="msiv">${isCash?'$'+pubMax:pubMax+'K'}</div></div>
    <div class="msi"><div class="msil">Elevated periods</div><div class="msiv">${card.elevated.filter(i=>i>=0).length}</div></div>`;
  // Year buttons
  const startYear=parseInt(ALL_MONTHS.find(m=>card.pub[ALL_MONTHS.indexOf(m)]!==null)||'2016').toString().substring(0,4)||2016;
  const yearRange=[];for(let y=parseInt(startYear);y<=2026;y++) yearRange.push(y);
  document.getElementById('yr-btns').innerHTML=yearRange.map(y=>`<button class="vt" data-v="year" data-y="${y}">${y}</button>`).join('');
  setupViewTabs();
  drawChart(card);
  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}
 
function setupViewTabs(){
  document.querySelectorAll('#vtabs .vt').forEach(btn=>{
    btn.onclick=()=>{
      const v=btn.dataset.v;
      if(v==='year'){viewMode='year';activeYear=parseInt(btn.dataset.y);}
      else{viewMode=v;activeYear=null;}
      document.querySelectorAll('#vtabs .vt').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      drawChart(activeCard);
    };
  });
  document.querySelectorAll('#vtabs .vt')[0].classList.add('active');
}
 
function drawChart(card){
  if(modalChart){modalChart.destroy();modalChart=null;}
  const ic=IC[card.issuer];
  const cd=getChartData(card);
  const isCash=card.isCash||false;
  const hasTgt=cd.tgtData&&cd.tgtData.some(Boolean);
 
  // Legend
  document.getElementById('cleg').innerHTML=`
    <div class="li"><div class="ls" style="background:${ic.line}"></div>Public offer</div>
    ${hasTgt?`<div class="li"><div class="ld" style="border-color:${ic.tgt}"></div>Best targeted</div>`:''}`;
 
  // Approx note
  document.getElementById('approx-note').textContent=card.approx
    ?'⚠ Some monthly data is estimated from quarterly records. Exact dates may vary by 1–2 months.':'';
 
  // Pattern legend visibility
  document.getElementById('pleg').style.display=card.elevated.filter(i=>i>=0).length?'flex':'none';
 
  const datasets=[{
    label:'Public offer',data:cd.pubData,
    borderColor:ic.line,backgroundColor:ic.fill,borderWidth:2.5,
    pointRadius:4,pointHoverRadius:8,pointBackgroundColor:ic.line,
    pointBorderColor:'#fff',pointBorderWidth:2,tension:.3,fill:true,spanGaps:true
  }];
  if(hasTgt) datasets.push({
    label:'Best targeted',data:cd.tgtData,
    borderColor:ic.tgt,borderWidth:1.5,borderDash:[5,4],
    pointRadius:3,pointHoverRadius:6,pointBackgroundColor:ic.tgt,
    pointBorderColor:'#fff',pointBorderWidth:1.5,tension:.3,fill:false,spanGaps:true
  });
 
  // Build pattern/peak annotations as chartjs plugins manually via afterDraw
  const allPub=cd.pubData.filter(Boolean);
  const peakVal=allPub.length?Math.max(...allPub):null;
  const peakIdx=peakVal!==null?cd.pubData.indexOf(peakVal):-1;
 
  // Elevated indices in current view
  let elevIdxsInView=[];
  if(viewMode==='all'){
    // year view: which year indices have elevated months
    elevIdxsInView=cd.years?cd.years.map((y,i)=>(cd.elevYears&&cd.elevYears.has(y))?i:-1).filter(i=>i>=0):[];
  } else if(viewMode==='year'&&activeYear){
    elevIdxsInView=card.elevated.filter(i=>i>=0&&ALL_MONTHS[i]&&ALL_MONTHS[i].startsWith(activeYear+'-')).map(i=>{
      const m=parseInt(ALL_MONTHS[i].split('-')[1])-1;return m;
    });
  } else if(viewMode==='monthly'){
    elevIdxsInView=card.elevated.filter(i=>i>=0);
  }
 
  const ctx=document.getElementById('mc2').getContext('2d');
  const hoverNote=document.getElementById('hn2');
 
  // Custom pattern band plugin
  const patternPlugin={
    id:'patternBands',
    afterDraw(chart){
      const{ctx,chartArea,scales}=chart;
      if(!chartArea)return;
      const xScale=scales.x;
      // Draw elevated bands
      elevIdxsInView.forEach(idx=>{
        if(idx<0||idx>=cd.labels.length)return;
        const x0=xScale.getPixelForValue(idx);
        const w=xScale.width/(cd.labels.length||1);
        ctx.save();
        ctx.fillStyle='rgba(255,193,7,.18)';
        ctx.fillRect(x0-w/2,chartArea.top,w,chartArea.bottom-chartArea.top);
        ctx.restore();
      });
      // Peak highlight
      if(peakIdx>=0&&peakIdx<cd.labels.length){
        const x0=xScale.getPixelForValue(peakIdx);
        const w=xScale.width/(cd.labels.length||1);
        ctx.save();
        ctx.fillStyle='rgba(200,16,46,.1)';
        ctx.fillRect(x0-w/2,chartArea.top,w,chartArea.bottom-chartArea.top);
        ctx.restore();
      }
    }
  };
 
  modalChart=new Chart(ctx,{
    type:'line',
    data:{labels:cd.labels,datasets},
    plugins:[patternPlugin],
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      layout:{padding:{top:6}},
      plugins:{
        legend:{display:false},
        tooltip:{
          enabled:true,
          position:'nearest',
          backgroundColor:'rgba(13,13,13,0.92)',
          titleColor:'#fff',
          bodyColor:'#ccc',
          borderColor:'rgba(255,255,255,0.1)',
          borderWidth:1,
          padding:10,
          cornerRadius:6,
          titleFont:{size:12,weight:'bold',family:"'Source Sans 3',sans-serif"},
          bodyFont:{size:11,family:"'Source Sans 3',sans-serif"},
          displayColors:false,
          callbacks:{
            title:(items)=>{
              return items[0].label;
            },
            label:(item)=>{
              const isCash=activeCard&&(activeCard.isCash||false);
              const v=item.parsed.y;
              if(v===null||v===undefined) return null;
              const ds=item.dataset.label;
              const isMiles=activeCard&&activeCard.currency==='Miles'; const val=isCash?'$'+v:(v+'K '+(isMiles?'Miles':'pts'));
              return ds+': '+val;
            },
            afterBody:(items)=>{
              const i=items[0].dataIndex;
              const card=activeCard;
              if(!card) return [];
              const cd=getChartData(card);
              let note='';
              if(viewMode==='monthly'||viewMode==='year'){
                const ym=viewMode==='monthly'?ALL_MONTHS[i]:(activeYear+'-'+String(i+1).padStart(2,'0'));
                note=card.monthlyNotes&&card.monthlyNotes[ym]?card.monthlyNotes[ym]:'';
              } else if(viewMode==='all'&&cd.years){
                const y=cd.years[i];
                note=Object.entries(card.monthlyNotes||{}).filter(([k])=>k.startsWith(y+'-')).map(([,v])=>v).join(' ');
              }
              const isElev=card.elevated&&card.elevated.filter(x=>x>=0).some(x=>{
                if(viewMode==='all'&&cd.years) return parseInt(ALL_MONTHS[x]&&ALL_MONTHS[x].split('-')[0])===cd.years[i];
                return x===i;
              });
              const lines=[];
              if(isElev) lines.push('🟡 Historically elevated period');
              if(note) lines.push(note);
              return lines;
            }
          }
        }
      },
      onHover:(evt,elements)=>{
        if(!elements.length)return;
        const i=elements[0].index;
        const label=cd.labels[i];
        const pub=cd.pubData[i];
        const tgt=cd.tgtData?cd.tgtData[i]:null;
        // spend req lookup
        let spend='';
        if(card.spendData){
          if(viewMode==='monthly') spend=card.spendData[i]||'';
          else if(viewMode==='year'&&cd.idxs) spend=card.spendData[cd.idxs[i]]||'';
          else if(viewMode==='all'&&cd.years){
            // find max-valued month in that year and use its spend
            const y=cd.years[i];
            const yIdxs=ALL_MONTHS.map((m,x)=>m.startsWith(y+'-')?x:-1).filter(x=>x>=0);
            const peakIdx=yIdxs.reduce((best,x)=>(card.pub[x]||0)>(card.pub[best]||0)?x:best,yIdxs[0]);
            spend=card.spendData[peakIdx]||'';
          }
        }
        // fall back to parsing from current offer text
        if(!spend&&card.current){
          const m=card.current.match(/\$[\d,.]+k?\s*\/\s*\d+\s*(?:months?|mos?)/i);
          if(m) spend=m[0];
        }
        // note
        let note='';
        if(viewMode==='monthly'||viewMode==='year'){
          const ym=viewMode==='monthly'?ALL_MONTHS[i]:activeYear+'-'+String(i+1).padStart(2,'0');
          note=card.monthlyNotes&&card.monthlyNotes[ym]?card.monthlyNotes[ym]:'';
        } else if(viewMode==='all'&&cd.years){
          const y=cd.years[i];
          note=Object.entries(card.monthlyNotes||{}).filter(([k])=>k.startsWith(y+'-')).map(([,v])=>v).join(' ');
        }
        const isElev=elevIdxsInView.includes(i);
        hoverNote.style.display='block';
        // Build full offer line
        const isMilesCard=card.currency==='Miles'; const valStr=pub?(isCash?('$'+pub):pub+'K '+(isMilesCard?'Miles':'pts')):'N/A';
        const tgtStr=(tgt&&tgt>pub)?(isCash?(' · Targeted: $'+tgt):(' · Targeted: '+tgt+'K '+(isMilesCard?'Miles':'pts'))):'';
        const spendStr=spend?` after ${spend}`:'';
        const elevStr=isElev?' &nbsp;🟡 <em>Historically elevated</em>':'';
        const noteStr=note?`<br><span style="color:var(--g600)">${note}</span>`:'';
        hoverNote.innerHTML=`<strong>${label}</strong><br><span style="font-size:13px;color:var(--g800)">${valStr}${tgtStr}${spendStr}</span>${elevStr}${noteStr}`;
      },
      scales:{
        x:{ticks:{font:{size:10},color:'#888',maxRotation:40,autoSkip:viewMode==='monthly',maxTicksLimit:viewMode==='monthly'?18:undefined},grid:{color:'rgba(0,0,0,.04)'}},
        y:{ticks:{font:{size:10},color:'#888',callback:v=>isCash?'$'+v:v+'K'},grid:{color:'rgba(0,0,0,.05)'},border:{display:false},title:{display:true,text:isCash?'Cash value ($)':(activeCard&&activeCard.currency==='Miles'?'Miles (thousands)':'Points (thousands)'),font:{size:10},color:'#999'}}
      }
    }
  });
  document.getElementById('hn').textContent='Hover a data point · 🟡 = historically elevated period · 🔴 = all-time peak · Sources: MonkeyMiles, FrequentMiler, UpgradedPoints, AwardWallet, DoctorofCredit, Slickdeals, USCreditCardGuide';
  hoverNote.style.display='none';
}
 
function closeModal(){
  document.getElementById('mo').classList.remove('open');
  document.body.style.overflow='';
  if(modalChart){modalChart.destroy();modalChart=null;}
}
 
document.getElementById('mcl').addEventListener('click',closeModal);
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('srch').addEventListener('input',e=>{searchQ=e.target.value.trim();renderCards();});
document.getElementById('itabs').addEventListener('click',e=>{
  const b=e.target.closest('.tb');if(!b)return;
  activeIssuer=b.dataset.i;
  document.querySelectorAll('.tb').forEach(x=>x.classList.toggle('active',x===b));
  renderCards();
});
 
 
// ── Populate card dropdown ─────────────────────────────────────────────
function populateDropdown(){
  const sel = document.getElementById('cardDropdown');
  // Group by issuer
  const order = ['amex','chase','co','citi','barclay','boa','bilt','usb'];
  const groups = {};
  CARDS.forEach(c => { (groups[c.issuer]||(groups[c.issuer]=[])).push(c); });
  order.forEach(iss => {
    if(!groups[iss]) return;
    const og = document.createElement('optgroup');
    og.label = IC[iss].lbl;
    groups[iss].forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
}
populateDropdown();
 
document.getElementById('cardDropdown').addEventListener('change', e => {
  const val = e.target.value;
  if(!val) {
    // Reset to show all
    searchQ = '';
    document.getElementById('srch').value = '';
    renderCards();
    return;
  }
  // Open the modal directly for this card
  const card = CARDS.find(c => c.id === val);
  if(card) {
    // Show the card's issuer tab and scroll to it
    activeIssuer = 'all';
    searchQ = '';
    document.getElementById('srch').value = '';
    document.querySelectorAll('.tb').forEach(b => b.classList.toggle('active', b.dataset.i === 'all'));
    renderCards();
    // Small delay to allow render, then open modal
    setTimeout(() => openModal(val), 50);
  }
  // Reset dropdown
  e.target.value = '';
});
 
// ── Great Offers toggle ────────────────────────────────────────────────
let greatOffersMode = false;
document.getElementById('greatOffersBtn').addEventListener('click', () => {
  greatOffersMode = !greatOffersMode;
  document.getElementById('greatOffersBtn').classList.toggle('active', greatOffersMode);
  renderCards();
});
 
// Patch getFiltered to support great offers mode
const _origGetFiltered = getFiltered;
// Override getFiltered inline
function getFiltered(){
  let cards = CARDS.filter(c=>{
    const mi=activeIssuer==='all'||c.issuer===activeIssuer;
    const q=searchQ.toLowerCase();
    const ms=!q||c.name.toLowerCase().includes(q)||c.tags.some(t=>t.includes(q))||IC[c.issuer].lbl.toLowerCase().includes(q)||c.current.toLowerCase().includes(q);
    return mi&&ms;
  });
  if(greatOffersMode) cards = cards.filter(c => c.rating === 'great');
  return cards;
}
 
renderCards();
</script>
